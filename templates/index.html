<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرايتي - سر صحتي</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .custom-file-upload { border: 2px dashed #3498db; padding: 20px; display: inline-block; cursor: pointer; border-radius: 10px; color: #3498db; width: 80%; }
        #preview { max-width: 100%; height: auto; margin-top: 20px; border-radius: 10px; display: none; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 20px; width: 100%; }
        #result { margin-top: 30px; text-align: right; padding: 15px; background: #f9f9f9; border-right: 5px solid #2ecc71; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ تطبيق مرايتي</h1>
    <p>حلل صحتك بالذكاء الاصطناعي</p>
    <label for="file-upload" class="custom-file-upload">📸 اختر صورة للفحص</label>
    <input id="file-upload" type="file" accept="image/*" style="display:none" onchange="previewImage(event)">
    <img id="preview">
    <button id="analyze-btn" onclick="analyzeImage()" disabled>ابدأ الفحص 🩺</button>
    <div id="result"></div>
</div>
<script>
    let base64Image = "";
    function previewImage(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const preview = document.getElementById('preview');
            preview.src = reader.result;
            preview.style.display = 'block';
            base64Image = reader.result.split(',')[1];
            document.getElementById('analyze-btn').disabled = false;
        }
        reader.readAsDataURL(file);
    }
    async function analyzeImage() {
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = "جاري التحليل... انتظر ثواني";
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64Image })
            });
            const data = await response.json();
            resultDiv.innerHTML = data.result || data.error;
        } catch (e) { resultDiv.innerHTML = "خطأ في الاتصال بالسيرفر"; }
    }
</script>
</body>
</html>
